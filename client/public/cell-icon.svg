<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">T-NHL Cell Icon</title>
  <desc id="desc">Stylized microscopy cell icon</desc>
  <defs>
    <radialGradient id="cellFill" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#7dd3fc" />
      <stop offset="65%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </radialGradient>
    <radialGradient id="nucleusFill" cx="35%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.85" />
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#020617" />
  <circle cx="32" cy="32" r="23" fill="url(#cellFill)" opacity="0.93" />
  <circle cx="32" cy="32" r="23" fill="none" stroke="#e2e8f0" stroke-opacity="0.35" stroke-width="1.5" />
  <ellipse cx="36" cy="30" rx="9" ry="8" fill="url(#nucleusFill)" />
  <circle cx="28" cy="38" r="2.1" fill="#e0f2fe" fill-opacity="0.75" />
  <circle cx="41" cy="24" r="1.6" fill="#f0f9ff" fill-opacity="0.9" />
</svg>
